<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Gold Buyers</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#111;
    color:#fff;
    line-height:1.6;
}

/* ===== NAV ===== */

.navbar{
    background:#000;
    border-bottom:2px solid #d4af37;
    position:sticky;
    top:0;
    z-index:999;
}

.nav-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo{
    color:#d4af37;
    font-size:24px;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:25px;
}

.menu a{
    color:#d4af37;
    text-decoration:none;
    font-weight:bold;
}

.menu a:hover{
    color:white;
}

/* ===== BANNER ===== */

.banner{
    max-width:1200px;
    margin:20px auto;
    padding:0 15px;
    position:relative;
}

.banner img{
    width:100%;
    border-radius:12px;
    display:block;
}

/* 🚫 BLOQUEIA CLIQUE NO BANNER INTEIRO */
.banner, .banner *{
    pointer-events:none;
}

/* ===== HOTSPOT (SÓ TELEFONE) ===== */

.banner-hotspot{
    position:absolute;

    /* 👇 canto inferior esquerdo como você pediu */
    bottom:6%;
    left:6%;

    width:200px;
    height:80px;

    pointer-events:auto;
    cursor:pointer;
}

/* texto visual do telefone */
.banner-text{
    position:absolute;
    bottom:6%;
    left:6%;
    color:white;
    font-size:1.3rem;
    font-weight:bold;
    text-shadow:0 0 10px rgba(0,0,0,0.9);
    pointer-events:none;
}

/* ===== SECTIONS ===== */

.section{
    max-width:1100px;
    margin:auto;
    padding:60px 20px;
    text-align:center;
}

.section h2{
    color:#d4af37;
    margin-bottom:20px;
}

/* ===== WHAT WE BUY ===== */

.buy-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
    margin-top:30px;
}

.buy-item{
    background:#1c1c1c;
    border:1px solid #d4af37;
    border-radius:10px;
    overflow:hidden;
}

.buy-item img{
    width:100%;
    height:130px;
    object-fit:cover;
}

.buy-item p{
    padding:10px;
    color:#d4af37;
    font-weight:bold;
}

/* ===== CONTACT ===== */

.contact{
    background:#000;
    text-align:center;
    padding:60px 20px;
}

.phone a{
    color:#d4af37;
    font-size:2rem;
    text-decoration:none;
    font-weight:bold;
}

.whatsapp-btn{
    display:inline-block;
    margin-top:20px;
    background:#25D366;
    color:#fff;
    padding:15px 30px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
<div class="nav-container">
    <div class="logo">David Gold Buyers</div>
    <div class="menu">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#whatwebuy">What We Buy</a>
        <a href="#contact">Contact</a>
    </div>
</div>
</nav>

<!-- BANNER -->
<section class="banner" id="home">

    <img src="gold-banner.png" alt="banner">

    <!-- TELEFONE VISUAL -->
    <div class="banner-text">
        07768 548 837
    </div>

    <!-- SÓ ESSA ÁREA É CLICÁVEL -->
    <a class="banner-hotspot"
       href="https://wa.me/447768548837?text=Hello%20David%20I%20want%20a%20free%20valuation"
       target="_blank">
    </a>

</section>

<!-- ABOUT -->
<section class="section" id="about">

<h2>About Us</h2>
<p>
Professional gold buyers with over 35 years experience, offering free valuations and fast payments.
</p>

</section>

<!-- WHAT WE BUY -->
<section class="section" id="whatwebuy">

<h2>What We Buy</h2>

<div class="buy-grid">

    <div class="buy-item">
        <img src="gold-ring.jpg">
        <p>Rings</p>
    </div>

    <div class="buy-item">
        <img src="gold-chain.jpg">
        <p>Chains</p>
    </div>

    <div class="buy-item">
        <img src="gold-bracelet.jpg">
        <p>Bracelets</p>
    </div>

    <div class="buy-item">
        <img src="gold-watch.jpg">
        <p>Watches</p>
    </div>

</div>

</section>

<!-- CONTACT -->
<section class="contact" id="contact">

<h2>Contact David</h2>

<div class="phone">
    <a href="tel:07768548837">07768 548 837</a>
</div>

<a class="whatsapp-btn"
   href="https://wa.me/447768548837"
   target="_blank">
   WhatsApp Us
</a>

</section>

</body>
</html>
