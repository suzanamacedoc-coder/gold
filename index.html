<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Gold Buyers</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:#fff;
}

/* ===== NAV ===== */

.navbar{
    background:#000;
    border-bottom:2px solid #d4af37;
    position:sticky;
    top:0;
    z-index:999;
}

.nav-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
}

.logo{
    color:#d4af37;
    font-size:24px;
    font-weight:bold;
}

.menu a{
    color:#d4af37;
    margin-left:20px;
    text-decoration:none;
}

/* ===== BANNER ===== */

.banner{
    max-width:1200px;
    margin:20px auto;
    padding:0 15px;
    position:relative;
}

.banner img{
    width:100%;
    border-radius:12px;
    display:block;
}

/* ===== HOTSPOT ONLY ON PHONE AREA ===== */

.banner-hotspot{
    position:absolute;

    /* 🔥 adjust position of clickable area */
    top:65%;      /* vertical position */
    left:50%;
    transform:translate(-50%, -50%);

    width:260px;
    height:80px;

    cursor:pointer;
}

/* optional visual guide (REMOVE later if you want invisible) */
/*
.banner-hotspot{
    border:2px dashed red;
}
*/

/* text shown on banner */
.banner-text{
    position:absolute;
    top:62%;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
}

.banner-phone{
    font-size:1.4rem;
    font-weight:bold;
    color:white;
    text-shadow:0 0 8px rgba(0,0,0,0.8);
}

/* ===== SECTIONS ===== */

.section{
    padding:60px 20px;
    text-align:center;
}

.section h2{
    color:#d4af37;
}

/* ===== WHAT WE BUY ===== */

.buy-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}

.buy-item{
    background:#1c1c1c;
    border:1px solid #d4af37;
    border-radius:10px;
    overflow:hidden;
}

.buy-item img{
    width:100%;
    height:130px;
    object-fit:cover;
}

/* ===== CONTACT ===== */

.contact{
    background:#000;
    text-align:center;
    padding:60px 20px;
}

.phone a{
    color:#d4af37;
    font-size:2rem;
    text-decoration:none;
}

.whatsapp-btn{
    display:inline-block;
    margin-top:20px;
    background:#25D366;
    padding:15px 30px;
    color:#fff;
    border-radius:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
<div class="nav-container">
    <div class="logo">David Gold Buyers</div>
    <div class="menu">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#whatwebuy">What We Buy</a>
        <a href="#contact">Contact</a>
    </div>
</div>
</nav>

<!-- BANNER -->
<section class="banner" id="home">

    <img src="gold-banner.png" alt="banner">

    <!-- visible text -->
    <div class="banner-text">
        <div class="banner-phone">07768 548 837</div>
    </div>

    <!-- CLICKABLE HOTSPOT ONLY -->
    <a class="banner-hotspot"
       href="https://wa.me/447768548837?text=Hello%20David%20I%20would%20like%20a%20free%20valuation"
       target="_blank">
    </a>

</section>

<!-- ABOUT -->
<section class="section" id="about">
<h2>About Us</h2>
<p>Professional gold buyers with 35 years experience.</p>
</section>

<!-- WHAT WE BUY -->
<section class="section" id="whatwebuy">
<h2>What We Buy</h2>

<div class="buy-grid">
    <div class="buy-item"><img src="gold-ring.jpg"></div>
    <div class="buy-item"><img src="gold-chain.jpg"></div>
    <div class="buy-item"><img src="gold-bracelet.jpg"></div>
    <div class="buy-item"><img src="gold-watch.jpg"></div>
</div>

</section>

<!-- CONTACT -->
<section class="contact" id="contact">

<h2>Contact</h2>

<div class="phone">
    <a href="tel:07768548837">07768 548 837</a>
</div>

<a class="whatsapp-btn"
   href="https://wa.me/447768548837"
   target="_blank">
   WhatsApp Us
</a>

</section>

</body>
</html>
