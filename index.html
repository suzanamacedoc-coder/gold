<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Gold Buyers</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:#fff;
}

/* ===== NAV ===== */

.navbar{
    background:#000;
    border-bottom:2px solid #d4af37;
    position:sticky;
    top:0;
    z-index:999;
}

.nav-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
}

.logo{
    color:#d4af37;
    font-size:24px;
}

/* ===== BANNER ===== */

.banner{
    max-width:1200px;
    margin:20px auto;
    padding:0 15px;
    position:relative;
}

.banner img{
    width:100%;
    display:block;
    border-radius:12px;
}

/* ❌ BLOCK ALL DEFAULT CLICK BEHAVIOR */
.banner, .banner *{
    pointer-events:none;
}

/* ===== HOTSPOT (ONLY PHONE AREA) ===== */

.banner-hotspot{
    position:absolute;

    /* 👇 bottom-left position (as you said) */
    bottom:6%;
    left:6%;

    width:180px;
    height:70px;

    pointer-events:auto; /* ONLY clickable area */
    cursor:pointer;
}

/* optional visual debug */
/*
.banner-hotspot{
    border:2px solid red;
}
*/

/* ===== TEXT (optional display) ===== */

.banner-text{
    position:absolute;
    bottom:6%;
    left:6%;
    color:#fff;
    font-weight:bold;
    font-size:1.2rem;
    text-shadow:0 0 8px rgba(0,0,0,0.8);
    pointer-events:none;
}

/* ===== SECTIONS ===== */

.section{
    padding:60px 20px;
    text-align:center;
}

.section h2{
    color:#d4af37;
}

/* ===== CONTACT ===== */

.contact{
    background:#000;
    text-align:center;
    padding:60px 20px;
}

.phone a{
    color:#d4af37;
    font-size:2rem;
    text-decoration:none;
}

.whatsapp-btn{
    display:inline-block;
    margin-top:20px;
    background:#25D366;
    padding:15px 30px;
    color:#fff;
    border-radius:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<nav class="navbar">
<div class="nav-container">
    <div class="logo">David Gold Buyers</div>
</div>
</nav>

<!-- BANNER -->
<section class="banner">

    <img src="gold-banner.png" alt="banner">

    <!-- visible phone text -->
    <div class="banner-text">
        07768 548 837
    </div>

    <!-- ONLY CLICKABLE AREA -->
    <a class="banner-hotspot"
       href="https://wa.me/447768548837?text=Hello%20David%20I%20want%20a%20valuation"
       target="_blank">
    </a>

</section>

</body>
</html>
